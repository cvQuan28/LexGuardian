# LexGuardian — Full Stack (Production)
# Usage: cp .env.example .env && docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: lexguardian-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lexguardian}
    ports:
      - "5433:5432"
    volumes:
      - lexguardian_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lexguardian-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Override for Docker internal networking (takes precedence over .env)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lexguardian}
    volumes:
      - lexguardian_uploads:/app/backend/uploads
      - lexguardian_data:/app/backend/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lexguardian-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5174:80"
    restart: unless-stopped

volumes:
  lexguardian_postgres_data:
  lexguardian_uploads:
  lexguardian_data:
